<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMT Mail</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0066ff,#00c6ff,#5f27cd);
overflow:hidden;
}

.background{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,rgba(255,255,255,.18),transparent 40%),
radial-gradient(circle at bottom right,rgba(255,255,255,.18),transparent 40%);
}

.container{
position:relative;
width:420px;
padding:35px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
border-radius:20px;
border:1px solid rgba(255,255,255,.2);
box-shadow:0 15px 35px rgba(0,0,0,.25);
text-align:center;
color:white;
z-index:2;
}

.logo{
width:95px;
height:95px;
border-radius:50%;
background:white;
padding:8px;
object-fit:contain;
margin-bottom:18px;
box-shadow:0 0 25px rgba(255,255,255,.3);
}

h2{
margin-bottom:6px;
font-size:30px;
}

p{
color:#e9e9e9;
margin-bottom:25px;
}

.inputBox{
margin:15px 0;
}

input,textarea{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.18);
color:white;
font-size:15px;
}

input::placeholder,
textarea::placeholder{
color:#efefef;
}

textarea{
height:130px;
resize:none;
}

button{
width:100%;
padding:15px;
margin-top:18px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
background:white;
color:#0066ff;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
background:#f2f2f2;
box-shadow:0 8px 25px rgba(255,255,255,.3);
}

.footer{
margin-top:18px;
font-size:13px;
color:#f2f2f2;
opacity:.8;
}
</style>

</head>
